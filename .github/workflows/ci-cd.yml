name: Vajra CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        cd project_vajra
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        pytest tests/
        
    - name: Build Docker image
      run: |
        docker build -f deployment/Dockerfile -t vajra-forensic:latest .
        
    - name: Push to Registry
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag vajra-forensic:latest ghcr.io/${{ github.repository_owner }}/vajra-forensic:latest
        docker push ghcr.io/${{ github.repository_owner }}/vajra-forensic:latest
        
  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Staging
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          docker pull ghcr.io/${{ github.repository_owner }}/vajra-forensic:latest
          docker-compose -f deployment/docker-compose.yml up -d